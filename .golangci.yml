# OTTO Gateway — golangci-lint config
# Matches the trust-gate set from docs/briefs/go_port_brief.md §3.12.
# Strict by design; warnings are CI hard failures.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - bodyclose       # http.Response.Body closed
    - errcheck        # unchecked errors
    - errorlint       # errors.Is/As instead of ==
    - gosec           # security issues (subprocess, crypto, hardcoded creds)
    - govet           # built-in suspicious-construct checker
    - ineffassign     # ineffectual assignments
    - nilerr          # returning err when it is nil (and vice versa)
    - noctx           # http.Request without ctx
    - revive          # configurable golint successor — see settings below
    - staticcheck     # high-signal correctness checks
    - unparam         # unused parameters
    - unused          # unused identifiers
    - wrapcheck       # wrap errors at package boundaries
  settings:
    revive:
      rules:
        - name: exported               # require godoc on exported symbols
        - name: var-naming
        - name: package-comments
        - name: error-return
        - name: error-naming
        - name: error-strings
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: redefines-builtin-id
    gosec:
      excludes:
        - G304  # file inclusion via variable — false positives during dev; revisit later
    wrapcheck:
      # v2 schema uses kebab-case. Defaults already cover .Errorf,
      # errors.New, errors.Unwrap, .Wrap, .Wrapf, .WithMessage,
      # .WithMessagef, .WithStack — extend with errors.Join only.
      extra-ignore-sigs:
        - errors.Join(
  exclusions:
    rules:
      # Test files get a relaxed rule set — panics, t.Fatal, fixture wiring etc.
      - path: _test\.go
        linters:
          - errcheck
          - wrapcheck
          - gosec
      # main.go is allowed to log.Fatal / os.Exit
      - path: cmd/.*main\.go
        linters:
          - wrapcheck
