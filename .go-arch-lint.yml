# go-arch-lint Phase 3.1 baseline (extended in Plan 03.1-01 Task 3).
#
# Components reflect the actual non-test import graph through Phase 2 + the
# Phase 3.1 adapter_anthropic seam. The TRST-04 boundary is enforced here:
#
#   * adapter_ollama  → canonical only (consumer-defined Engine interface
#                       in the adapter package; *engine.Engine satisfies
#                       it structurally via cmd/main.go wiring).
#   * adapter_anthropic → canonical only (same TRST-04 contract; the
#                         next plan (03.1-02) creates source files under
#                         internal/adapter/anthropic/**).
#   * engine          → canonical + acp (via acp_adapter.go boundary file).
#   * pool            → canonical + acp + engine (satisfies engine.ACPClient).
#   * auth            → no internal deps (standalone middleware).
#   * server          → config + auth + session (Phase 5 — needs
#                       session.ErrSessionNotFound in the DELETE handler
#                       sentinel-error branch).
#   * session         → canonical + acp + engine (Entry satisfies
#                       engine.ACPClient via the entry_acp.go boundary).
#   * adapter_*       → canonical + session (Phase 5 — X-Session-Id
#                       routing reads *session.Registry/*session.Entry
#                       directly; internal/engine import remains
#                       forbidden per the original TRST-04 rule).
#
# Test files are excluded from the boundary check — they may import any
# package freely (blackbox _test packages, integration tests with pool
# wiring, goleak, etc.). See docs/briefs/go_port_brief.md §3.12 (TRST-04).
version: 3
workdir: internal

excludeFiles:
  - "_test\\.go$"

components:
  admin:
    in: admin/**
  acp:
    in: acp/**
  adapter_ollama:
    in: adapter/ollama/**
  adapter_anthropic:
    in: adapter/anthropic/**
  adapter_openai:
    in: adapter/openai/**
  auth:
    in: auth/**
  canonical:
    in: canonical/**
  config:
    in: config/**
  engine:
    in: engine/**
  pool:
    in: pool/**
  session:
    in: session/**
  server:
    in: server/**
  version:
    in: version/**
  testutil:
    in: testutil/**

deps:
  admin:
    anyVendorDeps: true
    mayDependOn:
      - version
    # Critically: admin does NOT depend on pool, session, or engine.
    # The PoolDetailSource/RegistryStatsSource consumer-defined interfaces
    # in admin.go are the seam; cmd/otto-gateway adapter shims do the
    # translation at the boundary (TRST-04 invariant).
  acp:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - version
  adapter_ollama:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - session
      - engine  # Phase 6 D-05: adapters invoke engine.CoerceToolCall
                # directly on the coerce-from-text path. The Engine
                # interface in adapter.go remains the structural seam for
                # Engine.Collect / Engine.Run (TRST-04 still upheld for
                # those code paths); CoerceToolCall is a package-level
                # function with no engine state, so the direct import is
                # acceptable per the Phase 6 per-surface contract.
  adapter_anthropic:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - session
  adapter_openai:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - session
      - engine  # Phase 6 D-05: same rationale as adapter_ollama —
                # engine.CoerceToolCall is a stateless package-level
                # function invoked from both the non-streaming handler
                # path and the streaming end-of-stream coerce path.
  auth:
    anyVendorDeps: true
  canonical:
    anyVendorDeps: true
  config:
    anyVendorDeps: true
  engine:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - acp
  pool:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - acp
      - engine
  session:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - acp
      - engine
  server:
    anyVendorDeps: true
    mayDependOn:
      - auth
      - config
      - session
      - version
  version:
    anyVendorDeps: true
  testutil:
    anyVendorDeps: true
