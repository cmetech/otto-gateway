# go-arch-lint Phase 1 scaffold.
# Components declared; deps reflect actual Phase 1 import graph (non-test files).
# Test files excluded — they may import any package freely (blackbox _test packages, goleak, etc.).
# Phase 2 activates tighter restriction rules: canonical imports nothing,
# server only depends on canonical/config/version, etc.
# See docs/briefs/go_port_brief.md §3.12 (TRST-04).
version: 3
workdir: internal

excludeFiles:
  - "_test\\.go$"

components:
  acp:
    in: acp/**
  canonical:
    in: canonical/**
  config:
    in: config/**
  server:
    in: server/**
  version:
    in: version/**
  testutil:
    in: testutil/**

# Phase 1: dep rules permissive — reflect actual Phase 1 import graph so check exits 0.
# Phase 2 will tighten these once adapter↔canonical↔engine boundaries are established.
deps:
  acp:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - version
  server:
    anyVendorDeps: true
    mayDependOn:
      - config
      - version
  canonical:
    anyVendorDeps: true
  config:
    anyVendorDeps: true
  version:
    anyVendorDeps: true
  testutil:
    anyVendorDeps: true
