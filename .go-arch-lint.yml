# go-arch-lint Phase 3.1 baseline (extended in Plan 03.1-01 Task 3).
#
# Components reflect the actual non-test import graph through Phase 2 + the
# Phase 3.1 adapter_anthropic seam. The TRST-04 boundary is enforced here:
#
#   * adapter_ollama  → canonical only (consumer-defined Engine interface
#                       in the adapter package; *engine.Engine satisfies
#                       it structurally via cmd/main.go wiring).
#   * adapter_anthropic → canonical only (same TRST-04 contract; the
#                         next plan (03.1-02) creates source files under
#                         internal/adapter/anthropic/**). Track 3b Task 4
#                         adds a scoped engine dep for
#                         engine.ExtractToolCallWrappers only — see the
#                         adapter_anthropic.mayDependOn comment below.
#   * engine          → canonical + acp (via acp_adapter.go boundary file).
#   * pool            → canonical + acp + engine (satisfies engine.ACPClient).
#   * auth            → no internal deps (standalone middleware).
#   * server          → config + auth + session (Phase 5 — needs
#                       session.ErrSessionNotFound in the DELETE handler
#                       sentinel-error branch).
#   * session         → canonical + acp + engine (Entry satisfies
#                       engine.ACPClient via the entry_acp.go boundary).
#   * adapter_*       → canonical + session (Phase 5 — X-Session-Id
#                       routing reads *session.Registry/*session.Entry
#                       directly; internal/engine import remains
#                       forbidden per the original TRST-04 rule).
#
# Test files are excluded from the boundary check — they may import any
# package freely (blackbox _test packages, integration tests with pool
# wiring, goleak, etc.). See docs/briefs/go_port_brief.md §3.12 (TRST-04).
version: 3
workdir: internal

excludeFiles:
  - "_test\\.go$"

components:
  admin:
    in: admin/**
  acp:
    in: acp/**
  adapter_ollama:
    in: adapter/ollama/**
  adapter_anthropic:
    in: adapter/anthropic/**
  adapter_openai:
    in: adapter/openai/**
  auth:
    in: auth/**
  canonical:
    in: canonical/**
  capture:
    in: capture/**
  config:
    in: config/**
  engine:
    in: engine/**
  plugin_pii:
    in: plugin/pii/**
  plugin:
    in: plugin/**
  pool:
    in: pool/**
  session:
    in: session/**
  server:
    in: server/**
  version:
    in: version/**
  testutil:
    in: testutil/**

deps:
  admin:
    anyVendorDeps: true
    mayDependOn:
      - version
    # Critically: admin does NOT depend on pool, session, or engine.
    # The PoolDetailSource/RegistryStatsSource consumer-defined interfaces
    # in admin.go are the seam; cmd/otto-gateway adapter shims do the
    # translation at the boundary (TRST-04 invariant).
  acp:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - version
  adapter_ollama:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - session
      - engine  # Phase 6 D-05: adapters invoke engine.CoerceToolCall
                # directly on the coerce-from-text path. The Engine
                # interface in adapter.go remains the structural seam for
                # Engine.Collect / Engine.Run (TRST-04 still upheld for
                # those code paths); CoerceToolCall is a package-level
                # function with no engine state, so the direct import is
                # acceptable per the Phase 6 per-surface contract.
      - auth    # Phase 8 PLUG-03 / 08-02 Task 4: call auth.ExtractToken
                # to parse the bearer credential off Authorization / x-api-key
                # headers and stamp it on ctx via canonical.WithBearerToken
                # for the canonical-layer AuthHook. Header-parse helper only;
                # auth.Bearer middleware stays in the server router until
                # slice 5 removes it.
      - plugin  # Phase 8 OBSV-03 / 08-05 Task 4b: read X-Request-Id off
                # the inbound request, mint via plugin.NewRequestID()
                # when absent, and stamp ctx via plugin.WithRequestID
                # BEFORE engine.Run/engine.Collect. Mirrors the
                # canonical.WithBearerToken stamp for the bearer
                # credential. Required so LoggingHook's sync.Map keyed
                # by request_id (slice 3) + PIIRedactionHook's summary
                # stash (slice 4) share a non-empty correlation key.
      - plugin_pii  # Phase 8 D-04 / 08-05 Task 4b: stamp the per-request
                    # *pii.Summary via pii.WithSummary BEFORE engine
                    # entry so PIIRedactionHook (populator) and
                    # LoggingHook (consumer) share one pointer via ctx.
                    # Without this stamp PIIRedactionHook falls back to
                    # a local Summary (counter bookkeeping correct) but
                    # LoggingHook omits the `redacted` slog attr.
  adapter_anthropic:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - session
      - engine  # Track 3b Task 4: collect.go's CollectAnthropicChat
                # calls engine.ExtractToolCallWrappers ONLY — the
                # unambiguous {"tool_call":{name,arguments}} wrapper
                # extractor, which fires solely on that explicit
                # marker shape. It NEVER calls engine.CoerceToolCall
                # (the ambiguous bare-`{args}` heuristic used by
                # adapter_ollama / adapter_openai below) — that would
                # forge tool_use blocks out of legitimate JSON-shaped
                # assistant text and break the Anthropic anti-forgery
                # invariant (D-01 / D-17 scenario 5). The static guard
                # TestAnthropic_DoesNotCallCoerceToolCall enforces the
                # CoerceToolCall exclusion at the source level across
                # both handlers.go and collect.go.
      - auth    # Phase 8 PLUG-03 / 08-02 Task 4: same rationale as
                # adapter_ollama. Anthropic checks x-api-key first per
                # Phase 3.1 D-15, then falls back to auth.ExtractToken
                # for the Bearer path.
      - plugin  # Phase 8 OBSV-03 / 08-05 Task 4b: same X-Request-Id
                # ctx-stamp rationale as adapter_ollama.
      - plugin_pii  # Phase 8 D-04 / 08-05 Task 4b: same pii.Summary
                    # ctx-stamp rationale as adapter_ollama.
  adapter_openai:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - session
      - engine  # Phase 6 D-05: same rationale as adapter_ollama —
                # engine.CoerceToolCall is a stateless package-level
                # function invoked from both the non-streaming handler
                # path and the streaming end-of-stream coerce path.
      - auth    # Phase 8 PLUG-03 / 08-02 Task 4: same rationale as
                # adapter_ollama — call auth.ExtractToken to stamp the
                # bearer credential on ctx for AuthHook.
      - plugin  # Phase 8 OBSV-03 / 08-05 Task 4b: same X-Request-Id
                # ctx-stamp rationale as adapter_ollama.
      - plugin_pii  # Phase 8 D-04 / 08-05 Task 4b: same pii.Summary
                    # ctx-stamp rationale as adapter_ollama.
  auth:
    anyVendorDeps: true
  canonical:
    anyVendorDeps: true
  capture:
    anyVendorDeps: true
  config:
    anyVendorDeps: true
  engine:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - acp
  plugin:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - engine  # PreHook/PostHook interface types only. Implementing
                # engine.PreHook / engine.PostHook without depending on
                # the package is impossible in Go, so the dep is honest
                # (08-RESEARCH Open Question 1 recommendation).
      - plugin_pii  # Phase 8 D-04 API seam: LoggingHook (in plugin/)
                    # reads pii.SummaryFromContext to emit the
                    # `redacted={Email:2, SSN:1}` slog field.
                    # plugin_pii does NOT import plugin in slice 3
                    # (summary.go is stdlib-only); slice 4 adds the
                    # reverse direction for redaction-event logging.
                    # Both directions are explicitly allowed by D-04.
  plugin_pii:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - plugin
      - engine  # Phase 8 PLUG-06 / 08-04 Task 5: PIIRedactionHook
                # implements engine.PreHook (compile-time assertion
                # `var _ engine.PreHook = (*PIIRedactionHook)(nil)`).
                # Implementing engine.PreHook without depending on
                # the engine package is impossible in Go, so the dep
                # is honest. Mirrors the parent `plugin` component's
                # rationale for the same edge.
  pool:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - acp
      - engine
  session:
    anyVendorDeps: true
    mayDependOn:
      - canonical
      - acp
      - engine
  server:
    anyVendorDeps: true
    mayDependOn:
      - auth
      - config
      - session
      - version
  version:
    anyVendorDeps: true
  testutil:
    anyVendorDeps: true
